server:
  port: 8090

spring:
  application:
    name: travelai-app
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:mysql://localhost:3306/travelai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password: 123456

jwt:
  secret: travelai-secret-key-2026
  expiration: 7200000

ai:
  api:
    url: http://localhost:8080/ai
    key: test-api-key

knife4j:
  enable: false

logging:
  level:
    com.travelai: DEBUG
    org.springframework.security: INFO